spring:
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    hikari:
      maximum-pool-size: ${APP_DB_MAX_POOL:10}
      minimum-idle: ${APP_DB_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  cache:
    type: caffeine
    cache-names: statsQueries
    caffeine:
      spec: maximumSize=${APP_STATS_CACHE_MAX_SIZE:10000},expireAfterWrite=${APP_STATS_CACHE_TTL:30s}

  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${SPRING_MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SPRING_MAIL_SMTP_STARTTLS:true}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: [openid, profile, email]
          discord:
            provider: discord
            client-id: ${DISCORD_CLIENT_ID:}
            client-secret: ${DISCORD_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: ${DISCORD_REDIRECT_URI:http://localhost:8080/login/oauth2/code/discord}
            scope: [identify, email]
            client-name: Discord
        provider:
          google:
            issuer-uri: https://accounts.google.com
          discord:
            authorization-uri: https://discord.com/api/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: id

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    expiration-minutes: 60
  oauth2:
    success-redirect: ${OAUTH2_SUCCESS_REDIRECT:http://localhost:5173/auth/callback}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  frontend:
    reset-password-url: ${APP_FRONTEND_RESET_PASSWORD_URL:http://localhost:5173/reset-password}
    verify-email-url: ${APP_FRONTEND_VERIFY_EMAIL_URL:http://localhost:5173/verify-email}
  password-reset:
    expiration-minutes: ${APP_PASSWORD_RESET_EXP_MINUTES:60}
    mail-from: ${APP_MAIL_FROM:}
  email-verification:
    expiration-minutes: ${APP_EMAIL_VERIFICATION_EXP_MINUTES:60}
    mail-from: ${APP_MAIL_FROM:}
    cleanup-interval-ms: ${APP_EMAIL_VERIFICATION_CLEANUP_MS:86400000}
  discord:
    bot-token: ${APP_DISCORD_BOT_TOKEN:}
  storage:
    root: ${APP_STORAGE_ROOT:uploads}
    max-size-bytes: ${APP_STORAGE_MAX_BYTES:10485760}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  price-id: ${STRIPE_PRICE_ID:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  success-url: ${STRIPE_SUCCESS_URL:http://localhost:5173/abo?success=1}
  cancel-url: ${STRIPE_CANCEL_URL:http://localhost:5173/abo?canceled=1}

logging:
  level:
    root: INFO

server:
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/octet-stream
    min-response-size: 1024

---
# Profil dev
spring:
  config:
    activate:
      on-profile: dev

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: [openid, profile, email]
          discord:
            provider: discord
            client-id: ${DISCORD_CLIENT_ID:}
            client-secret: ${DISCORD_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: ${DISCORD_REDIRECT_URI:http://localhost:8080/login/oauth2/code/discord}
            scope: [identify, email]
            client-name: Discord
        provider:
          google:
            issuer-uri: https://accounts.google.com
          discord:
            authorization-uri: https://discord.com/api/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: id

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/snkProjet_docker}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:Pipounet29}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
  oauth2:
    success-redirect: ${OAUTH2_SUCCESS_REDIRECT:http://localhost:5173/auth/callback}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:https://mystash.fr,https://www.mystash.fr,http://localhost:5173}

logging:
  level:
    org.springframework.security: DEBUG
    backend.security: DEBUG

