spring:
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    hikari:
      maximum-pool-size: ${APP_DB_MAX_POOL:10}
      minimum-idle: ${APP_DB_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  cache:
    type: caffeine
    cache-names: statsQueries
    caffeine:
      spec: maximumSize=${APP_STATS_CACHE_MAX_SIZE:10000},expireAfterWrite=${APP_STATS_CACHE_TTL:120s}

  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${SPRING_MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SPRING_MAIL_SMTP_STARTTLS:true}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: [openid, profile, email]
          discord:
            provider: discord
            client-id: ${DISCORD_CLIENT_ID:}
            client-secret: ${DISCORD_CLIENT_SECRET:}
            authorization-grant-type: authorization_code
            redirect-uri: ${DISCORD_REDIRECT_URI:http://localhost:8080/login/oauth2/code/discord}
            scope: [identify, email]
            client-name: Discord
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub
            jwk-set-uri: https://www.googleapis.com/oauth2/v3/certs
          discord:
            authorization-uri: https://discord.com/api/oauth2/authorize
            token-uri: https://discord.com/api/oauth2/token
            user-info-uri: https://discord.com/api/users/@me
            user-name-attribute: id

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    expiration-minutes: 60
  backend:
    public-base-url: ${APP_BACKEND_PUBLIC_BASE_URL:http://localhost:8080}
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
    reset-password-url: ${APP_FRONTEND_RESET_PASSWORD_URL:${app.frontend.base-url}/reset-password}
    verify-email-url: ${APP_FRONTEND_VERIFY_EMAIL_URL:${app.frontend.base-url}/verify-email}
  oauth2:
    success-redirect: ${OAUTH2_SUCCESS_REDIRECT:${app.frontend.base-url}/auth/callback}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  password-reset:
    expiration-minutes: ${APP_PASSWORD_RESET_EXP_MINUTES:60}
    mail-from: ${APP_MAIL_FROM:}
  email-verification:
    expiration-minutes: ${APP_EMAIL_VERIFICATION_EXP_MINUTES:60}
    mail-from: ${APP_MAIL_FROM:}
    cleanup-interval-ms: ${APP_EMAIL_VERIFICATION_CLEANUP_MS:86400000}
  discord:
    bot-token: ${APP_DISCORD_BOT_TOKEN:}
  storage:
    root: ${APP_STORAGE_ROOT:uploads}
    max-size-bytes: ${APP_STORAGE_MAX_BYTES:10485760}
  notifications:
    generation-cron: ${APP_NOTIFICATIONS_GENERATION_CRON:0 15 3 * * *}
  delivery:
    scan-fixed-delay-ms: ${APP_DELIVERY_SCAN_FIXED_DELAY_MS:300000}
    scan-batch-size: ${APP_DELIVERY_SCAN_BATCH_SIZE:25}
    gmail-max-results: ${APP_DELIVERY_GMAIL_MAX_RESULTS:${app.delivery.scan-batch-size}}
    gmail-lookback-days: ${APP_DELIVERY_GMAIL_LOOKBACK_DAYS:15}
    gmail-redirect-uri: ${APP_DELIVERY_GMAIL_REDIRECT_URI:${app.backend.public-base-url}/delivery/mail-accounts/gmail/callback}
    token-encryption-key: ${APP_TOKEN_ENCRYPTION_KEY:}
    tracking-provider: ${APP_DELIVERY_TRACKING_PROVIDER:DIRECT}
    tracking-refresh-fixed-delay-ms: ${APP_DELIVERY_TRACKING_REFRESH_FIXED_DELAY_MS:900000}
    tracking-refresh-batch-size: ${APP_DELIVERY_TRACKING_REFRESH_BATCH_SIZE:50}
    laposte-api-key: ${LAPOSTE_API_KEY:}
    laposte-tracking-base-url: ${LAPOSTE_TRACKING_BASE_URL:https://api.laposte.fr/suivi/v2/idships}
    mondial-relay-enseigne: ${MONDIAL_RELAY_ENSEIGNE:${MONDIAL_RELAY_CUSTOMER_ID:}}
    mondial-relay-private-key: ${MONDIAL_RELAY_PRIVATE_KEY:${MONDIAL_RELAY_PASSWORD:}}
    mondial-relay-endpoint: ${MONDIAL_RELAY_ENDPOINT:https://www.mondialrelay.fr/WebService/WebService.asmx}
    aftership-api-key: ${AFTERSHIP_API_KEY:}
    aftership-webhook-secret: ${AFTERSHIP_WEBHOOK_SECRET:}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  price-id: ${STRIPE_PRICE_ID:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  success-url: ${STRIPE_SUCCESS_URL:${app.frontend.base-url}/abo?success=1}
  cancel-url: ${STRIPE_CANCEL_URL:${app.frontend.base-url}/abo?canceled=1}

logging:
  level:
    root: INFO

server:
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/octet-stream
    min-response-size: 1024

