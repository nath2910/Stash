spring:
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev} # dev par défaut, override en prod via env

  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${SPRING_MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${SPRING_MAIL_SMTP_STARTTLS:true}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: [openid, profile, email]

app:
  jwt:
    # Pas de secret par défaut : doit être fourni ; une valeur de dev est ajoutée dans le profil dev
    secret: ${JWT_SECRET:}
    expiration-minutes: 60

  oauth2:
    # défini par profil (dev/prod)
    success-redirect: ${OAUTH2_SUCCESS_REDIRECT:}

  frontend:
    reset-password-url: ${APP_FRONTEND_RESET_PASSWORD_URL:http://localhost:5173/reset-password}
    verify-email-url: ${APP_FRONTEND_VERIFY_EMAIL_URL:http://localhost:5173/verify-email}

  password-reset:
    expiration-minutes: ${APP_PASSWORD_RESET_EXP_MINUTES:60}
    mail-from: ${APP_MAIL_FROM:}

  email-verification:
    expiration-minutes: ${APP_EMAIL_VERIFICATION_EXP_MINUTES:60}
    mail-from: ${APP_MAIL_FROM:}
    cleanup-interval-ms: ${APP_EMAIL_VERIFICATION_CLEANUP_MS:3600000}

---

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5433/snkProjet_docker}
    username: ${SPRING_DATASOURCE_USERNAME:myuser}
    password: ${SPRING_DATASOURCE_PASSWORD:Pipounet29}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
  oauth2:
    success-redirect: ${OAUTH2_SUCCESS_REDIRECT:http://localhost:5173/auth/callback}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    org.springframework.security: DEBUG
    backend.security: DEBUG

---

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET} # obligatoire en prod
  oauth2:
    success-redirect: ${OAUTH2_SUCCESS_REDIRECT} # obligatoire en prod
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS} # obligatoire en prod

server:
  forward-headers-strategy: framework
